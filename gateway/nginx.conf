server {
  listen 80;

  location /api/ {
    proxy_set_header Host $http_host;
    proxy_pass http://backend:8000/api/;
  }

  location /admin/ {
    proxy_set_header Host $http_host; 
    set $backend_upstream backend:8000;
    proxy_pass http://$backend_upstream;
  }

  location / {
    alias /staticfiles/;
    index index.html;
  }
}